<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Color Stack</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell" aria-labelledby="game-title">
      <header class="topbar">
        <div>
          <p class="eyebrow">Computer puzzle</p>
          <h1 id="game-title">Color Stack</h1>
        </div>
        <div class="score-strip" aria-live="polite">
          <span>Moves <strong id="move-count">0</strong></span>
          <span>Best <strong id="best-score">-</strong></span>
          <span>Plays <strong id="play-count">0</strong></span>
          <span id="solver-status">Ready</span>
        </div>
      </header>

      <section class="settings" aria-label="Puzzle settings">
        <label>
          <span>Puzzle</span>
          <select id="level-select">
            <option value="random" selected>Random</option>
            <option value="level1">Level 1</option>
            <option value="level2">Level 2</option>
            <option value="level3">Level 3</option>
            <option value="level4">Level 4</option>
            <option value="level5">Level 5</option>
          </select>
        </label>
        <label>
          <span>Blocks</span>
          <select id="capacity-select">
            <option value="4">4 high</option>
            <option value="5" selected>5 high</option>
            <option value="6">6 high</option>
          </select>
        </label>
        <label>
          <span>Colors</span>
          <select id="color-count-select">
            <option value="4">4 colors</option>
            <option value="5">5 colors</option>
            <option value="6" selected>6 colors</option>
            <option value="7">7 colors</option>
            <option value="8">8 colors</option>
          </select>
        </label>
        <label>
          <span>Empty poles</span>
          <select id="extra-towers-select">
            <option value="1" selected>1 pole</option>
            <option value="2">2 poles</option>
          </select>
        </label>
        <label>
          <span>Difficulty</span>
          <select id="difficulty-select">
            <option value="easy">Easy</option>
            <option value="normal" selected>Normal</option>
            <option value="hard">Hard</option>
            <option value="expert">Expert</option>
          </select>
        </label>
      </section>

      <section class="game-area" aria-label="Color Stack game board">
        <div id="reward-layer" class="reward-layer" aria-hidden="true"></div>
        <div id="board" class="board"></div>
      </section>

      <section id="win-panel" class="win-panel" aria-live="polite" hidden>
        <div>
          <p class="eyebrow">Puzzle solved</p>
          <h2>Color Stack Complete</h2>
          <p id="win-summary">Solved in 0 moves.</p>
        </div>
        <div class="win-actions">
          <button id="win-new-game" type="button">New Game</button>
          <button id="win-harder" type="button">Harder Puzzle</button>
        </div>
      </section>

      <nav class="controls" aria-label="Game controls">
        <button id="new-game" type="button">New</button>
        <button id="undo" type="button">Undo</button>
        <button id="hint" type="button">Hint</button>
        <button id="autoplay" type="button">Auto</button>
        <button id="sound-toggle" type="button" aria-pressed="false">Sound On</button>
      </nav>

      <aside class="ad-panel is-placeholder" aria-label="Advertisement">
        <span>Advertisement</span>
        <ins
          id="adsense-slot"
          class="adsbygoogle"
          data-ad-format="auto"
          data-full-width-responsive="true"></ins>
      </aside>
    </main>

    <script src="script.js"></script>
  </body>
</html>
